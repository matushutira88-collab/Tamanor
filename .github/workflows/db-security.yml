name: db-security

# Mandatory RLS & database-security gate. Runs the integration suites that need a REAL Postgres with
# the restricted tamanor_app role — a regression here (a missing policy, an over-grant, a bypassrls
# role, a leaked tenant context) fails the build. No production secrets are used: every suite spins up
# its own throwaway Postgres via Docker (available on GitHub-hosted runners) and refuses any non-local
# DATABASE_URL.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  db-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @guardora/db exec prisma generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Meta HTTP resilience (timeout/retry/backoff) + appsecret_proof classification
        run: |
          pnpm meta-http:test
          pnpm billing-webhook:test

      - name: Worker fail-closed config validator + heartbeat/shutdown controllers (pure)
        run: |
          pnpm worker-config:test
          pnpm worker-shutdown:test

      - name: Internal Cron endpoint auth (fail-closed, pure)
        run: pnpm cron-auth:test

      - name: Session lifetime config validation (fail-closed, pure)
        run: pnpm auth-config:test

      - name: Auth security core (strength/generator/HIBP/Turnstile/audit-privacy, pure)
        run: |
          pnpm auth-strength:test
          pnpm auth-generator:test
          pnpm auth-hibp:test
          pnpm auth-turnstile:test
          pnpm auth-audit:test

      - name: Protection product model (score + auto-hide decision gate, pure)
        run: |
          pnpm protection-score:test
          pnpm auto-hide-decision:test

      # Real-Postgres integration gates (each provisions its own throwaway container).
      - name: RLS & DB security (grant audit, NULL-context, cross-tenant, context leakage, role attrs)
        run: pnpm rls-security:test

      - name: Sync lease heartbeat, fencing generation & interrupted lifecycle (real Postgres race)
        run: pnpm sync-fencing:test

      - name: Vercel-native dispatcher + budgeted sync job checkpoint/resume (real Postgres)
        run: pnpm job-checkpoint:test

      - name: Server-enforced session lifetime — idle/absolute/remember/rotation (real Postgres)
        run: pnpm auth-session-timeout:test

      - name: Active sessions + revoke + password change/reset (real Postgres)
        run: pnpm auth-session-mgmt:test

      - name: Account protection resolution + monitored-account limit + cross-tenant RLS (real Postgres)
        run: pnpm account-protection:test

      - name: Webhook out-of-order ordering guard
        run: pnpm webhook-ordering:test

      - name: Checkout concurrency + tenant RLS isolation
        run: pnpm checkout-concurrency:test
